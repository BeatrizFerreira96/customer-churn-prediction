<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Churn Prediction</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 1200px;
    transition: 0.3s;
}

.container:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 35px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    width: 100%;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

label {
    font-weight: 600;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
}

button {
    grid-column: span 2;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(
        135deg,
        #2196F3,
        #1565C0
    );
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.result-box {
    margin-top: 25px;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    font-weight: bold;
    display: none;
}

.result-low {
    background: #e8f5e9;
    color: #2e7d32;
}

.result-high {
    background: #ffebee;
    color: #c62828;
}

.shap-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
    background: #f8f8f8;
}

.shap-box ul {
    padding-left: 20px;
}

.shap-box li {
    margin-bottom: 10px;
}

@media (max-width: 600px) {

    .container {
        width: 100%;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    button {
        grid-column: span 1;
    }
}

.recommendation-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 12px;
    background: #f8f8f8;
}

.recommendation-box h3 {
    margin-top: 0;
}

.recommendation-high {
    border-left: 6px solid #f44336;
}

.recommendation-low {
    border-left: 6px solid #4CAF50;
}
.shap-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

.factor-card {
    padding: 20px;
    border-radius: 12px;
}

.risk-up {
    background: #fff5f5;
    border-left: 5px solid #f44336;
}

.risk-down {
    background: #f1fff4;
    border-left: 5px solid #4CAF50;
}

.factor-card ul {
    padding-left: 20px;
}

.footer {
    margin-top: 40px;
    text-align: center;
    color: #777;
    font-size: 14px;
    padding-top: 20px;
    border-top: 1px solid #eee;
}

.explanation-container {
    margin-top: 25px;
}

.explanation-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.explanation-card {
    padding: 20px;
    border-radius: 12px;
    height: 100%;
}
.increase-risk {
    background: #fff5f5;
    border-left: 5px solid #f44336;
}

.reduce-risk {
    background: #f1fff4;
    border-left: 5px solid #4CAF50;
}

.explanation-card h3 {
    margin-top: 0;
}

.explanation-card ul {
    list-style: none;
    padding-left: 0;
    margin: 0;
}

.explanation-card li {
    margin-bottom: 12px;
}


.explanation-container {
    margin-top: 25px;
    padding: 20px;
    border-radius: 12px;
    background: #f8f8f8;
}

</style>
</head>

<body>

<div class="container">

<h2>Customer Churn Prediction</h2>

<p class="subtitle">
    Enter customer information to estimate churn risk
</p>

<form id="form">

<div class="form-grid">
    
<div class="form-group">    
<label>Gender</label>
<select id="Gender">
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Senior Citizen</label>
<select id="Senior_Citizen">
    <option value="No">No</option>
    <option value="Yes">Yes</option>
</select>
</div>

<div class="form-group">
<label>Partner</label>
<select id="Partner">
    <option value="No">No</option>
    <option value="Yes">Yes</option>
</select>
</div>

<div class="form-group">
<label>Dependents</label>
<select id="Dependents">
    <option value="No">No</option>
    <option value="Yes">Yes</option>
</select>
</div>

<div class="form-group">
<label>Tenure Months</label>
<input type="number" id="Tenure_Months" value="12">
</div>

<div class="form-group">
<label>Monthly Charges</label>
<input type="number"
       step="0.01"
       id="Monthly_Charges"
       value="70">
</div>

<div class="form-group">
<label>Internet Service</label>
<select id="Internet_Service">
    <option value="DSL">DSL</option>
    <option value="Fiber optic">Fiber optic</option>
    <option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Contract</label>
<select id="Contract">
    <option value="Month-to-month">Month-to-month</option>
    <option value="One year">One year</option>
    <option value="Two year">Two year</option>
</select>
</div>

<div class="form-group">
<label>Payment Method</label>
<select id="Payment_Method">
    <option value="Electronic check">Electronic check</option>
    <option value="Mailed check">Mailed check</option>
    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
    <option value="Credit card (automatic)">Credit card (automatic)</option>
</select>
</div>

</div>

<button id="predictBtn" type="submit">
    Estimate Churn Risk
</button>

<div id="loading"
     style="display:none;
            text-align:center;
            margin-top:20px;
            font-weight:bold;">
    ⏳ Calculating risk assessment...
</div>

</form>

<div id="result" class="result-box"></div>

<div id="risk-container" style="display:none; margin-top:20px;">
    <h3>Churn Probability</h3>

    <div style="
        width:100%;
        background:#e0e0e0;
        border-radius:10px;
        overflow:hidden;
        height:25px;
    ">
        <div id="risk-bar" style="
            width:0%;
            height:100%;
            transition:0.5s;
        "></div>
    </div>

    <p id="risk-text"></p>
</div>


<p id="confidenceText"></p>



<div id="recommendationBox"></div>

<div id="explanations"></div>

<footer class="footer">
    Built by Beatriz Ferreira |
    PhD Physics • Machine Learning • FastAPI • SHAP
</footer>
</div>


<script>

document.getElementById("form").onsubmit = async function(e) {


    
    e.preventDefault();
    const button = document.getElementById("predictBtn");
    const loadingDiv = document.getElementById("loading");
    loadingDiv.style.display = "block";
    button.disabled = true;
    button.innerText = "Predicting...";
   
    const data = {
    Gender:
        document.getElementById("Gender").value,

    Senior_Citizen:
        document.getElementById("Senior_Citizen").value,

    Partner:
        document.getElementById("Partner").value,

    Dependents:
        document.getElementById("Dependents").value,

    Tenure_Months:
        Number(
            document.getElementById("Tenure_Months").value
        ),

    Internet_Service:
        document.getElementById("Internet_Service").value,

    Contract:
        document.getElementById("Contract").value,

    Payment_Method:
        document.getElementById("Payment_Method").value,

    Monthly_Charges:
        Number(
            document.getElementById("Monthly_Charges").value
        )
};
    
    
    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    loadingDiv.style.display = "none";
    console.log(result);

    const resultDiv = document.getElementById("result");

    resultDiv.style.display = "block";

    resultDiv.className =
        "result-box " +
        (result.prediction === "churn"
            ? "result-high"
            : "result-low");

    resultDiv.innerText =
        result.prediction === "churn"
            ? "⚠ High Churn Risk"
            : "✅ Customer Likely To Stay";


    let confidenceLabel;

if (result.churn_probability > 0.8 || result.churn_probability < 0.2)
{
    confidenceLabel = "High";
}
else if (result.churn_probability > 0.65 || result.churn_probability < 0.35)
{
    confidenceLabel = "Moderate";
}
else
{
    confidenceLabel = "Low";
}

document.getElementById("confidenceText").innerText =
    `Model Confidence: ${(result.confidence * 100).toFixed(1)}%`;

    const riskContainer =
        document.getElementById("risk-container");

    const riskBar =
        document.getElementById("risk-bar");

    const riskText =
        document.getElementById("risk-text");

    const riskPercent =
        result.churn_probability * 100;

    riskContainer.style.display = "block";

riskBar.style.width = riskPercent + "%";

let riskColor;

if (result.churn_probability < 0.3)
    riskColor = "#4CAF50";
else if (result.churn_probability < 0.6)
    riskColor = "#ff9800";
else
    riskColor = "#f44336";

riskBar.style.background = riskColor;
    
    riskText.innerText =
        riskPercent.toFixed(1) + "% Churn Probability";
    // SHAP DISPLAY

    let recommendationTitle;
let recommendationText;

if (result.churn_probability > 0.6)
{
    recommendationTitle =
        "⚠ Retention Action Recommended";

    recommendationText =
        "Customer exhibits elevated churn risk. Consider loyalty incentives, contract upgrades or proactive support.";
}
else if (result.churn_probability > 0.3)
{
    recommendationTitle =
        "🟡 Moderate Churn Risk";

    recommendationText =
        "Customer may benefit from engagement and retention campaigns.";
}
else
{
    recommendationTitle =
        "✅ Stable Customer";

    recommendationText =
        "Customer appears likely to remain with the service.";
}
const recommendationBox =
    document.getElementById("recommendationBox");

recommendationBox.className =
    "recommendation-box " +
    (result.churn_probability > 0.6
        ? "recommendation-high"
        : "recommendation-low");

recommendationBox.innerHTML = `
    <h3>${recommendationTitle}</h3>
    <p>${recommendationText}</p>
`;

const explanationsDiv =
    document.getElementById("explanations");

const positiveList =
    result.top_positive
        .map(item =>
            `<li>▲ ${item.feature} (${item.shap.toFixed(3)})</li>`
        )
        .join("");

const negativeList =
    result.top_negative
        .map(item =>
            `<li>▼ ${item.feature} (${Math.abs(item.shap).toFixed(3)})</li>`
        )
        .join("");

explanationsDiv.innerHTML = `
<div class="explanation-container">

    <div class="explanation-columns">

        <div class="explanation-card increase-risk">
            <h3>Factors Increasing Churn Risk</h3>
            <ul>${positiveList}</ul>
        </div>

        <div class="explanation-card reduce-risk">
            <h3>Factors Reducing Churn Risk</h3>
            <ul>${negativeList}</ul>
        </div>

    </div>

</div>
`;

button.disabled = false;
button.innerText = "Estimate Churn Risk";
loadingDiv.style.display = "none";    
   
};

</script>

</body>
</html>
